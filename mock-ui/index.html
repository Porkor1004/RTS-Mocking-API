
<!DOCTYPE html>
<meta charset="UTF-8">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{display:flex;height:680px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-tertiary)}
.sidebar{width:220px;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.logo{font-size:14px;font-weight:500;color:var(--color-text-primary)}
.logo span{color:#1D9E75}
.role-switch{display:flex;gap:4px;margin-top:10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:3px}
.role-btn{flex:1;font-size:11px;padding:4px 6px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:var(--color-text-secondary);font-family:var(--font-sans)}
.role-btn.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500;border:0.5px solid var(--color-border-tertiary)}
.nav{flex:1;padding:8px}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--border-radius-md);cursor:pointer;font-size:13px;color:var(--color-text-secondary);margin-bottom:2px;border:none;background:transparent;width:100%;text-align:left;font-family:var(--font-sans)}
.nav-item:hover{background:var(--color-background-secondary)}
.nav-item.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.nav-icon{width:16px;height:16px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:14px 20px;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.user-chip{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--color-text-secondary)}
.avatar{width:28px;height:28px;border-radius:50%;background:#9FE1CB;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#085041}
.content{flex:1;padding:20px;overflow-y:auto}
.screen{display:none}
.screen.active{display:block}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px 20px;margin-bottom:14px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:var(--color-text-secondary)}
.form-group input,.form-group select{padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
.form-group textarea{padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);resize:none;height:60px;font-family:var(--font-sans)}
.btn{padding:8px 16px;border-radius:var(--border-radius-md);font-size:13px;font-weight:500;cursor:pointer;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);font-family:var(--font-sans)}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn-primary:hover{background:#0F6E56}
.btn-danger{background:#E24B4A;color:#fff;border-color:#E24B4A}
.btn-danger:hover{background:#A32D2D}
.table-list{width:100%;border-collapse:collapse}
.table-list th{font-size:11px;color:var(--color-text-secondary);font-weight:500;padding:6px 10px;border-bottom:0.5px solid var(--color-border-tertiary);text-align:left}
.table-list td{font-size:13px;padding:9px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary)}
.table-list tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-blue{background:#E6F1FB;color:#185FA5}
.story-bar{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap}
.story-pill{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-secondary)}
.story-pill.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.step-flow{display:flex;align-items:center;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.step{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500}
.step.done{background:#EAF3DE;color:#3B6D11}
.step.active{background:#1D9E75;color:#fff}
.step.pending{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.step-arrow{font-size:10px;color:var(--color-text-tertiary)}
.highlight-box{background:#E1F5EE;border:0.5px solid #5DCAA5;border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:12px;font-size:12px;color:#085041}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px}
.avail-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.table-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px;text-align:center;cursor:pointer;transition:border-color 0.15s}
.table-card:hover{border-color:#1D9E75}
.table-card.selected{border-color:#1D9E75;background:#E1F5EE}
.table-card .tc-name{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.table-card .tc-cap{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.table-card .tc-status{font-size:10px;margin-top:4px}
.confirm-card{background:#E1F5EE;border:0.5px solid #5DCAA5;border-radius:var(--border-radius-lg);padding:16px 20px;text-align:center}
.confirm-id{font-size:24px;font-weight:500;color:#085041;margin-bottom:4px}
.confirm-sub{font-size:12px;color:#0F6E56}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.notif-item{display:flex;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.notif-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0}
.notif-text{font-size:12px;color:var(--color-text-primary)}
.notif-time{font-size:11px;color:var(--color-text-secondary)}
</style>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Table<span>Reserve</span></div>
      <div class="role-switch">
        <button class="role-btn active" onclick="switchRole('customer', this)">Customer</button>
        <button class="role-btn" onclick="switchRole('staff', this)">Staff</button>
        <button class="role-btn" onclick="switchRole('admin', this)">Admin</button>
      </div>
    </div>
    <div class="nav" id="nav-area"></div>
  </div>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="page-title">Dashboard</div>
        <div style="font-size:11px;color:var(--color-text-secondary);margin-top:2px" id="page-sub">Restaurant Table Reservation System</div>
      </div>
      <div class="user-chip">
        <div id="user-info" style="text-align:right"></div>
        <div class="avatar" id="user-avatar">JD</div>
      </div>
    </div>

    <div class="content" id="content-area">
      <!-- screens injected here -->
    </div>
  </div>
</div>

<script>
const roles = {
  customer: {
    user: 'John Smith', avatar: 'JS', role: 'Customer',
    nav: [
      {id:'dash', label:'Dashboard', icon:'▦'},
      {id:'availability', label:'Check Availability', icon:'◎'},
      {id:'make', label:'Make Reservation', icon:'+'},
      {id:'my', label:'My Reservations', icon:'≡'},
    ]
  },
  staff: {
    user: 'Sara Lee', avatar: 'SL', role: 'Staff',
    nav: [
      {id:'staff-dash', label:'Dashboard', icon:'▦'},
      {id:'reservations', label:'All Reservations', icon:'≡'},
      {id:'walkin', label:'Walk-in Booking', icon:'+'},
      {id:'tables', label:'Table Status', icon:'⊞'},
    ]
  },
  admin: {
    user: 'Admin User', avatar: 'AU', role: 'Admin',
    nav: [
      {id:'admin-dash', label:'Dashboard', icon:'▦'},
      {id:'all-res', label:'All Reservations', icon:'≡'},
      {id:'reports', label:'Reports', icon:'◈'},
      {id:'settings', label:'Settings', icon:'⊙'},
    ]
  }
};

const TABLE_CAPACITY = {
  'T-01': 2,
  'T-02': 4,
  'T-03': 6,
  'T-04': 4,
  'T-05': 8,
};

const INITIAL_RESERVATIONS = [
  { id: '#5001', customerName: 'John Smith', date: '2026-05-20', time: '18:00', guests: 4, table: 'T-03', status: 'CONFIRMED', request: 'Window seat' },
  { id: '#5000', customerName: 'Amy Park', date: '2026-05-20', time: '19:00', guests: 2, table: 'T-01', status: 'CONFIRMED', request: '' },
  { id: '#4999', customerName: 'Walk-in', date: '2026-05-20', time: '12:30', guests: 3, table: 'T-02', status: 'WALK-IN', request: '' },
  { id: '#4988', customerName: 'John Smith', date: '2026-04-10', time: '19:00', guests: 2, table: 'T-01', status: 'PENDING', request: '' },
  { id: '#4812', customerName: 'John Smith', date: '2026-03-15', time: '12:00', guests: 6, table: 'T-05', status: 'CANCELLED', request: '' },
];

const INITIAL_TABLE_STATUSES = {
  'T-01': 'Available',
  'T-02': 'Occupied',
  'T-03': 'Available',
  'T-04': 'Out of Service',
  'T-05': 'Available',
};

const INITIAL_NOTIFICATIONS = [
  { text: 'New reservation #5001 created', color: '#1D9E75', time: '2 min ago' },
  { text: 'Reservation #4900 modified', color: '#BA7517', time: '15 min ago' },
  { text: 'Reservation #4812 cancelled', color: '#E24B4A', time: '1 hr ago' },
];

function createInitialState() {
  return {
    reservations: INITIAL_RESERVATIONS.map(reservation => ({ ...reservation })),
    tableStatuses: { ...INITIAL_TABLE_STATUSES },
    notifications: INITIAL_NOTIFICATIONS.map(notification => ({ ...notification })),
    selectedReservationId: '#5001',
    nextReservationId: 5002,
    availabilitySearch: {
      date: '2026-05-20',
      time: '18:00',
      guests: 4,
      selectedTable: 'T-03',
    },
    lastConfirmedReservationId: '#5001',
  };
}

let appState = createInitialState();

function getCustomerReservations() {
  return appState.reservations.filter(reservation => reservation.customerName === 'John Smith');
}

function getReservationById(id) {
  return appState.reservations.find(reservation => reservation.id === id);
}

function getTableCapacity(tableId) {
  return TABLE_CAPACITY[tableId] || 0;
}

function getTableDisplayLabel(tableId) {
  return `${tableId} (${getTableCapacity(tableId)} pax)`;
}

function getTableOptionLabel(tableId, suffix) {
  return `${tableId} — ${getTableCapacity(tableId)} pax${suffix ? ` (${suffix})` : ''}`;
}

function getReservationStatusBadge(status) {
  const badgeClass = {
    CONFIRMED: 'badge-green',
    PENDING: 'badge-amber',
    CANCELLED: 'badge-red',
    'WALK-IN': 'badge-blue',
  }[status] || 'badge-blue';
  return `<span class="badge ${badgeClass}">${status}</span>`;
}

function getTableStatusBadge(status) {
  const badgeClass = {
    Available: 'badge-green',
    Occupied: 'badge-red',
    'Out of Service': 'badge-amber',
  }[status] || 'badge-blue';
  return `<span class="badge ${badgeClass}">${status}</span>`;
}

function getUpcomingReservationCount() {
  return getCustomerReservations().filter(reservation =>
    reservation.status === 'CONFIRMED' && reservation.date >= '2026-04-10'
  ).length;
}

function renderCustomerReservationRows(withActions = false) {
  return getCustomerReservations().map(reservation => {
    const actions = reservation.status === 'CANCELLED'
      ? `<span style="font-size:11px;color:var(--color-text-tertiary)">—</span>`
      : `
        <button class="btn" style="padding:3px 10px;font-size:11px" onclick="openModifyReservation('${reservation.id}')">Modify</button>
        <button class="btn btn-danger" style="padding:3px 10px;font-size:11px" onclick="openCancelReservation('${reservation.id}')">Cancel</button>
      `;

    return withActions
      ? `
        <tr data-reservation-id="${reservation.id}">
          <td>${reservation.id}</td><td>${reservation.date}</td><td>${reservation.time}</td><td>${reservation.guests}</td>
          <td>${getReservationStatusBadge(reservation.status)}</td>
          <td style="display:flex;gap:6px;padding-top:5px">${actions}</td>
        </tr>`
      : `
        <tr data-reservation-id="${reservation.id}">
          <td>${reservation.date}</td><td>${reservation.time}</td><td>${reservation.guests}</td><td>${getTableDisplayLabel(reservation.table)}</td><td>${getReservationStatusBadge(reservation.status)}</td>
        </tr>`;
  }).join('');
}

function renderAllReservationRows() {
  return appState.reservations.map(reservation => `
    <tr data-reservation-id="${reservation.id}">
      <td>${reservation.id}</td><td>${reservation.customerName}</td><td>${reservation.date}</td><td>${reservation.time}</td><td>${reservation.guests}</td><td>${reservation.table}</td><td>${getReservationStatusBadge(reservation.status)}</td>
    </tr>
  `).join('');
}

function renderNotifications() {
  return appState.notifications.slice(0, 3).map((notification, index) => `
    <div class="notif-item" ${index === 2 ? 'style="border:none"' : ''}>
      <div class="notif-dot" style="background:${notification.color}"></div>
      <div>
        <div class="notif-text">${notification.text}</div>
        <div class="notif-time">${notification.time}</div>
      </div>
    </div>
  `).join('');
}

function renderTableStatusRows() {
  return Object.entries(appState.tableStatuses).map(([tableId, status]) => `
    <tr data-table-id="${tableId}">
      <td>${tableId}</td>
      <td>${getTableCapacity(tableId)} pax</td>
      <td>${getTableStatusBadge(status)}</td>
      <td>
        <select style="font-size:11px;padding:3px 6px;border:0.5px solid var(--color-border-tertiary);border-radius:6px;background:var(--color-background-primary);color:var(--color-text-primary)">
          ${['Available', 'Occupied', 'Out of Service'].map(option => `<option ${option === status ? 'selected' : ''}>${option}</option>`).join('')}
        </select>
      </td>
    </tr>
  `).join('');
}

function setSelectedReservation(id) {
  appState.selectedReservationId = id;
}

function openModifyReservation(id) {
  setSelectedReservation(id);
  goScreen('modify');
}

function openCancelReservation(id) {
  setSelectedReservation(id);
  goScreen('cancel');
}

function getSelectedReservation() {
  return appState.selectedReservationId ? getReservationById(appState.selectedReservationId) : null;
}

function addNotification(text, color) {
  appState.notifications.unshift({ text, color, time: 'Just now' });
}

function getReservationFormValues() {
  return {
    date: document.querySelector('input[type="date"]').value,
    time: document.querySelector('input[type="time"]').value,
    guests: Number(document.querySelector('input[type="number"]').value),
    table: document.querySelector('select').value.split(' ')[0],
    specialRequest: document.querySelector('textarea') ? document.querySelector('textarea').value.trim() : '',
  };
}

function prepareReservationFromAvailability() {
  appState.selectedReservationId = null;
  goScreen('make');
}

function saveCustomerReservation() {
  const values = getReservationFormValues();
  const reservationId = `#${appState.nextReservationId++}`;
  appState.reservations.unshift({
    id: reservationId,
    customerName: 'John Smith',
    date: values.date,
    time: values.time,
    guests: values.guests,
    table: values.table,
    status: 'CONFIRMED',
    request: values.specialRequest,
  });
  appState.lastConfirmedReservationId = reservationId;
  addNotification(`New reservation ${reservationId} created`, '#1D9E75');
  goScreen('confirm');
}

function saveReservationChanges() {
  const reservation = getSelectedReservation();
  const values = getReservationFormValues();
  reservation.date = values.date;
  reservation.time = values.time;
  reservation.guests = values.guests;
  reservation.table = values.table;
  reservation.request = values.specialRequest;
  addNotification(`Reservation ${reservation.id} modified`, '#BA7517');
  goScreen('my');
}

function confirmCancellation() {
  const reservation = getSelectedReservation();
  reservation.status = 'CANCELLED';
  addNotification(`Reservation ${reservation.id} cancelled`, '#E24B4A');
  goScreen('my');
}

function createWalkInReservation() {
  const textInputs = document.querySelectorAll('input[type="text"]');
  const reservationId = `#${appState.nextReservationId++}`;
  appState.reservations.unshift({
    id: reservationId,
    customerName: textInputs[0].value || 'Walk-in',
    date: document.querySelector('input[type="date"]').value,
    time: document.querySelector('input[type="time"]').value,
    guests: Number(document.querySelector('input[type="number"]').value),
    table: document.querySelector('select').value.split(' ')[0],
    status: 'WALK-IN',
    request: '',
  });
  addNotification(`Walk-in reservation ${reservationId} created`, '#1D9E75');
  goScreen('reservations');
}

function saveTableStatuses() {
  document.querySelectorAll('[data-table-id]').forEach(row => {
    const tableId = row.getAttribute('data-table-id');
    appState.tableStatuses[tableId] = row.querySelector('select').value;
  });
  addNotification('Table statuses updated', '#185FA5');
  goScreen('tables');
}

const screens = {
  dash: () => `
    <div class="story-bar">
      <span style="font-size:12px;color:var(--color-text-secondary);margin-top:4px">User story:</span>
      <div class="story-pill active">US-01 View Dashboard</div>
      <div class="story-pill" onclick="goScreen('availability')">US-02 Check Availability ↗</div>
      <div class="story-pill" onclick="goScreen('make')">US-03 Make Reservation ↗</div>
    </div>
    <div class="step-flow">
      <div class="step done">Login</div><span class="step-arrow">→</span>
      <div class="step active">Dashboard</div><span class="step-arrow">→</span>
      <div class="step pending">Check availability</div><span class="step-arrow">→</span>
      <div class="step pending">Reserve</div><span class="step-arrow">→</span>
      <div class="step pending">Confirmed</div>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-label">My reservations</div><div class="stat-val">${getCustomerReservations().length}</div></div>
      <div class="stat"><div class="stat-label">Upcoming</div><div class="stat-val">${getUpcomingReservationCount()}</div></div>
      <div class="stat"><div class="stat-label">Cancelled</div><div class="stat-val">${getCustomerReservations().filter(reservation => reservation.status === 'CANCELLED').length}</div></div>
    </div>
    <div class="card">
      <div class="section-title">Upcoming reservation</div>
      <table class="table-list">
        <thead><tr><th>Date</th><th>Time</th><th>Guests</th><th>Table</th><th>Status</th></tr></thead>
        <tbody>${renderCustomerReservationRows(false)}</tbody>
      </table>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary" onclick="goScreen('availability')">Check Availability ↗</button>
      <button class="btn" onclick="goScreen('my')">View All Reservations</button>
    </div>`,

  availability: () => `
    <div class="story-bar">
      <div class="story-pill" onclick="goScreen('dash')">US-01 Dashboard</div>
      <div class="story-pill active">US-02 Check Availability</div>
      <div class="story-pill" onclick="goScreen('make')">US-03 Make Reservation ↗</div>
    </div>
    <div class="step-flow">
      <div class="step done">Login</div><span class="step-arrow">→</span>
      <div class="step done">Dashboard</div><span class="step-arrow">→</span>
      <div class="step active">Check availability</div><span class="step-arrow">→</span>
      <div class="step pending">Reserve</div><span class="step-arrow">→</span>
      <div class="step pending">Confirmed</div>
    </div>
    <div class="card">
      <div class="section-title">FR-03 — Search availability</div>
      <div class="form-row">
        <div class="form-group"><label>Date</label><input type="date" value="${appState.availabilitySearch.date}"></div>
        <div class="form-group"><label>Time</label><input type="time" value="${appState.availabilitySearch.time}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Number of guests</label><input type="number" min="1" max="10" value="${appState.availabilitySearch.guests}"></div>
        <div class="form-group" style="justify-content:flex-end"><button class="btn btn-primary" onclick="showTables()">Search →</button></div>
      </div>
    </div>
    <div id="avail-result"></div>`,

  make: () => `
    <div class="story-bar">
      <div class="story-pill" onclick="goScreen('availability')">US-02 Check Availability</div>
      <div class="story-pill active">US-03 Make Reservation</div>
      <div class="story-pill" onclick="goScreen('confirm')">US-04 Confirmation ↗</div>
    </div>
    <div class="step-flow">
      <div class="step done">Login</div><span class="step-arrow">→</span>
      <div class="step done">Dashboard</div><span class="step-arrow">→</span>
      <div class="step done">Check availability</div><span class="step-arrow">→</span>
      <div class="step active">Reserve</div><span class="step-arrow">→</span>
      <div class="step pending">Confirmed</div>
    </div>
    <div class="card">
      <div class="section-title">FR-04 — Reservation details</div>
      <div class="form-row">

let currentRole = 'customer';
let currentScreen = 'dash';

function switchRole(role, buttonEl) {
  currentRole = role;
  const roleButtons = document.querySelectorAll('.role-btn');
  roleButtons.forEach(b => b.classList.remove('active'));
  const resolvedButton = buttonEl || Array.from(roleButtons).find(
    b => b.textContent.trim().toLowerCase() === role
  );
  if (resolvedButton) {
    resolvedButton.classList.add('active');
  }
  const cfg = roles[role];
  document.getElementById('user-avatar').textContent = cfg.avatar;
  document.getElementById('user-info').innerHTML = `<div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">${cfg.user}</div><div style="font-size:11px;color:var(--color-text-secondary)">${cfg.role}</div>`;
  renderNav(role);
  const firstScreen = cfg.nav[0].id;
  goScreen(firstScreen);
}

function renderNav(role) {
  const cfg = roles[role];
  const nav = document.getElementById('nav-area');
  nav.innerHTML = cfg.nav.map(item => `
    <button class="nav-item ${item.id === currentScreen ? 'active' : ''}" onclick="goScreen('${item.id}')">
      <span class="nav-icon">${item.icon}</span>${item.label}
    </button>`).join('');
}

function goScreen(id) {
  currentScreen = id;
  const fn = screens[id];
  if (!fn) return;
  document.getElementById('content-area').innerHTML = fn();
  const titles = {
    dash:'Dashboard', availability:'Check Availability', make:'Make Reservation',
    confirm:'Booking Confirmed', my:'My Reservations', modify:'Modify Reservation',
    cancel:'Cancel Reservation','staff-dash':'Staff Dashboard', reservations:'All Reservations',
    walkin:'Walk-in Booking', tables:'Table Status','admin-dash':'Admin Dashboard',
    'all-res':'All Reservations','reports':'Reports & Statistics','settings':'System Settings'
  };
  document.getElementById('page-title').textContent = titles[id] || id;
  document.querySelectorAll('.nav-item').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick') === `goScreen('${id}')`);
  });
}

function showTables() {
  appState.availabilitySearch = {
    date: document.querySelector('input[type="date"]').value,
    time: document.querySelector('input[type="time"]').value,
    guests: Number(document.querySelector('input[type="number"]').value),
    selectedTable: appState.availabilitySearch.selectedTable || 'T-03',
  };
  document.getElementById('avail-result').innerHTML = `
    <div class="card">
      <div class="section-title">Available tables — ${appState.availabilitySearch.date} at ${appState.availabilitySearch.time} for ${appState.availabilitySearch.guests} guests</div>
      <div class="avail-grid">
        <div class="table-card ${appState.availabilitySearch.selectedTable === 'T-02' ? 'selected' : ''}" onclick="selectTable(this,'T-02')"><div class="tc-name">T-02</div><div class="tc-cap">4 pax capacity</div><div class="tc-status"><span class="badge badge-green">Available</span></div></div>
        <div class="table-card ${appState.availabilitySearch.selectedTable === 'T-03' ? 'selected' : ''}" onclick="selectTable(this,'T-03')"><div class="tc-name">T-03</div><div class="tc-cap">6 pax capacity</div><div class="tc-status"><span class="badge badge-green">Available</span></div></div>
        <div class="table-card ${appState.availabilitySearch.selectedTable === 'T-05' ? 'selected' : ''}" onclick="selectTable(this,'T-05')"><div class="tc-name">T-05</div><div class="tc-cap">8 pax capacity</div><div class="tc-status"><span class="badge badge-green">Available</span></div></div>
        <div class="table-card" style="opacity:0.45;cursor:not-allowed"><div class="tc-name">T-01</div><div class="tc-cap">2 pax capacity</div><div class="tc-status"><span class="badge badge-red">Too small</span></div></div>
      </div>
      <button class="btn btn-primary" onclick="prepareReservationFromAvailability()">Proceed to Book ↗</button>
    </div>`;
}

function selectTable(el, name) {
  document.querySelectorAll('.table-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  appState.availabilitySearch.selectedTable = name;
}

switchRole('customer');
